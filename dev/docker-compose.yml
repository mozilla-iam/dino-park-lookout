# This is used for local development only.

services:
  lookout:
    image: dino-park-lookout:development
    build:
      context: ../
      dockerfile: Dockerfile.local
    environment:
      DPL_SETTINGS: /root/.settings.json
    volumes:
    - ../dev/settings.json:/root/.settings.json
    ports:
    - 127.0.0.1:8082:8082
    develop:
      watch:
        - path: ../src
          action: rebuild
        - path: ../Cargo.lock
          action: rebuild
